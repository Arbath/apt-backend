name: Build and Publish to GHCR

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: set lower case owner name
        run: |
          echo "REPO_LC=${GITHUB_REPOSITORY,,}" >> ${GITHUB_ENV}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ env.REPO_LC }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ env.REPO_LC }}:latest
            ghcr.io/${{ env.REPO_LC }}:${{ github.sha }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Update Image Tag in GitOps Repository
        uses: actions/checkout@v4
        with:
          repository: 'teknohole/lpm-k8s-config'
          token: ${{ secrets.PAT_LPM_K8S_CONFIG }}
          path: 'gitops-repo'

      - name: Update Deployment YAML
        run: |
          cd gitops-repo/backend
          # Mengganti tag image dengan Commit SHA terbaru dari Repo Aplikasi
          sed -i "s|image: ghcr.io/${{ env.REPO_LC }}:.*|image: ghcr.io/${{ env.REPO_LC }}:${{ github.sha }}|g" deployment.yaml
          
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add deployment.yaml
          if git diff-index --quiet HEAD; then
            echo "Tidak ada perubahan pada deployment.yaml. Melewati proses commit."
          else
            git commit -m "chore(backend): update image tag to ${{ github.sha }}"
            git push origin main
          fi